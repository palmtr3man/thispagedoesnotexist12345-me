[build]
  publish = "."

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Redirect /boarding to the Netlify function for clean URL usage
[[redirects]]
  from = "/boarding"
  to = "/.netlify/functions/boarding"
  status = 200

# Install dependencies declared in netlify/functions/package.json
[[plugins]]
  package = "@netlify/plugin-functions-install-core"
